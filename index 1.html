<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="mainContainer">
        <div>
            <h1>Note eingeben</h1>
            <div class="container">
                <div class="eigenschaften">
                    <div>
                        <label>Fach:</label>
                        <select>
                            <option>Mathe</option>
                            <option>Englisch</option>
                            <option>Deutsch</option>
                            <option>Chemie</option>
                        </select>
                    </div>
                
                    <div>
                        <label>Datum:</label>
                        <input type="date">
                    </div>
                
                    <div>
                        <label>Note:</label>
                         <select>
                            <option>Keine</option>
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                            <option>5</option>
                            <option>6</option>
                        </select>
                    </div>
                </div>
            
                <label class="notenart">Notenart</label>
                <div class="window">
                    <div>
                        <input type="radio" name="r">
                        <label>Schriftlich</label>
                        <input type="radio" name="r">
                        <label>Mündlich</label>
                    </div>
                </div>
            
                <button class="Absenden" type="submit">Absenden</button>
            </div>
        </div>
    </div>
</body>
</html>
